<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Résumé | Jason Hinshaw</title>

    <style>
        :root {
            --bg: #050816;
            --bgalt: #0b1020;
            --accent: #385ef8;
            --textmain: #e5e7eb;
            --textmuted: #9ca3af;
            --cardbg: #0f172a;
            --border: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #020617;
            color: var(--textmain);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        header {
            position: sticky;
            top: 0;
            background: #0f172a;
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
            z-index: 10;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navleft {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #38bdf8;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: black;
        }

        .navtitlemain {
            font-size: 1rem;
            font-weight: bold;
        }

        .navtitlesub {
            font-size: 0.75rem;
            color: var(--textmuted);
        }

        .navlinks {
            display: flex;
            gap: 1.25rem;
        }

        section {
            padding: 2.5rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: #0f172a;
        }

        .about-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .about-tagline {
            font-size: 1rem;
            color: var(--textmuted);
            margin-bottom: 1.5rem;
        }

        .resume-section {
            margin-top: 1.5rem;
        }

        .resume-link {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: var(--accent);
            color: black;
            border-radius: 6px;
            font-weight: bold;
        }

        .resume-preview img {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-top: 1.5rem;
            display: block;
        }

        footer {
            padding: 1.5rem 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--textmuted);
        }
    </style>
</head>

<body>
<div class="page">

<header>
    <div class="container">
        <div class="nav">
            <div class="navleft">
                <div class="avatar">JH</div>
                <div>
                    <div class="navtitlemain">Jason Hinshaw</div>
                    <div class="navtitlesub">Analytics and BI Portfolio</div>
                </div>
            </div>

            <div class="navlinks">
                <a href="index.html#aboutme">About</a>
                <a href="index.html#projects">Projects</a>
                <a href="index.html#dashboards">Dashboards</a>
                <a href="index.html#contact">Contact</a>
                <a href="resume.html" class="active">Résumé</a>
            </div>
        </div>
    </div>
</header>

<section id="resume">
    <div class="container about-container">
        <h2 class="about-title">Résumé</h2>
        <p class="about-tagline">Download • Preview</p>

        <div class="resume-section">
            <a href="Assets/Jason Hinshaw - Resume.pdf" class="resume-link" target="_blank">
                Download Résumé (PDF)
            </a>

            <div class="resume-preview">
                <img src="Assets/Resume Screenshot.png" alt="Résumé Preview">
            </div>
        </div>
    </div>
</section>

<footer>
    © 2026 Jason Hinshaw — All Rights Reserved
</footer>

</div>
</body>
</html>
